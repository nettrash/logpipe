# Example configuration for logpipe.
#
# Install location: /etc/logpipe/config.toml

[opensearch]
# Full base URL of the OpenSearch cluster. https:// strongly preferred.
endpoint = "https://opensearch.example.com:9200"

# Index (or data-stream) name. The daemon does NOT create the index;
# create it (or a matching index template) ahead of time.
index = "ubuntu-logs"

# HTTP basic-auth credentials. Use a dedicated ingest user with write-only
# permissions on the index.
username = "ingest"
password = "change-me"

# Set to false to allow self-signed certs (development only!).
verify_tls = true

# Per-request timeout in seconds.
request_timeout_secs = 30


[batch]
# Maximum events accumulated before a forced flush to _bulk.
max_events = 500
# Maximum time between flushes, regardless of fill level.
flush_secs = 5
# In-process queue size between the FIFO reader and the OpenSearch
# flusher. When full, the FIFO reader stops draining and the kernel's
# pipe buffer applies backpressure to customer writers. Bigger values
# absorb longer OpenSearch hiccups at the cost of memory (one Event
# per slot). Omit to use the default (max_events * 8).
# channel_capacity = 4000


# ---- Ingress -------------------------------------------------------------
#
# The daemon exposes a single named pipe (FIFO). Any local process that can
# write to this path can ship a log line:
#
#   echo "hello world"          > /dev/logpipe
#   tail -F /opt/app/app.log    > /dev/logpipe
#   printf '{"level":"error","message":"oom","tag":"checkout"}\n' \
#                               > /dev/logpipe
#
# Plain text lines become {"message": "<line>"} in OpenSearch.
# Lines that parse as a JSON object are merged into the document, with
# `message` and `tag` promoted to the document's top-level fields.

[sources.fifo]
# Where to create the FIFO. /dev/logpipe matches the "device file" mental
# model; /run/logpipe/in is also fine if you want stricter sandboxing
# (set PrivateDevices=true in the systemd unit too).
path = "/dev/logpipe"

# Permission bits applied on every startup. 0o622 = rw--w--w-: everyone can
# write, only the daemon reads. Tighten this with a dedicated group if you
# don't want all local users to be able to inject events.
mode = 0o622

# Default tag attached to every event. Customer-written JSON lines can
# override it with their own "tag" field.
tag = "customer"

# Coerce every customer-supplied field value to its JSON-encoded string form
# before sending it to OpenSearch. Off by default — JSON values keep their
# native types (numbers stay numbers, objects stay objects). Turn this on if
# you've been bitten by mapper_parsing_exception because the same field
# arrives as different types from different writers; with this flag set,
# 42 becomes "42", true becomes "true", and {"a":1} becomes "{\"a\":1}".
# stringify_values = false
